name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-cli:
    name: Build CLI (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          go build \
            -ldflags "-X github.com/faizalv/lemongrass/cmd/lemongrass/version.Version=${VER}" \
            -o "lemongrass-${{ matrix.os }}-${{ matrix.arch }}" \
            ./cmd/lemongrass/
      - name: Checksum
        run: |
          sha256sum "lemongrass-${{ matrix.os }}-${{ matrix.arch }}" \
            > "checksum-${{ matrix.os }}-${{ matrix.arch }}.txt"
      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: lemongrass-${{ matrix.os }}-${{ matrix.arch }}
      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksum-${{ matrix.os }}-${{ matrix.arch }}
          path: checksum-${{ matrix.os }}-${{ matrix.arch }}.txt

  merge-checksums:
    name: Merge Checksums
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: checksum-*
          merge-multiple: true
      - name: Merge
        run: sort checksum-*.txt > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: checksums.txt

  build-images:
    name: Build Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push lg-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/faizalv/lemongrass/lg-server:${{ github.ref_name }}
            ghcr.io/faizalv/lemongrass/lg-server:latest
      - name: Build and push lg-runner
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/faizalv/lemongrass/lg-runner:${{ github.ref_name }}
            ghcr.io/faizalv/lemongrass/lg-runner:latest
      - name: Build and push lg-embed
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.embed
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/faizalv/lemongrass/lg-embed:${{ github.ref_name }}
            ghcr.io/faizalv/lemongrass/lg-embed:latest
      - name: Build and push lg-lang
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lang
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/faizalv/lemongrass/lg-lang:${{ github.ref_name }}
            ghcr.io/faizalv/lemongrass/lg-lang:latest
